services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: lms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Lms@123456"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - lms-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Lms@123456 -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=LMS_DB;User Id=sa;Password=Lms@123456;TrustServerCertificate=True;MultipleActiveResultSets=true"
    ports:
      - "8080:8080"

volumes:
  lms-sql-data:
