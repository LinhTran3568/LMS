services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: lms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "P@ssw0rd123!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - lms-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=LMS_DB;User Id=sa;Password=P@ssw0rd123!;TrustServerCertificate=True;MultipleActiveResultSets=true"
    ports:
      - "8080:8080"

volumes:
  lms-sql-data:
